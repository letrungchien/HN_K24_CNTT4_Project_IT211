spring.application.name=Project_WebService_IT211

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db_badminton?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456

#Config jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config jwt
jwt-secret=chuoidetaobimatjwt123456
jwt-expired=600000
jwt-refresh-expired=86400000

#Config upload ảnh
app.upload.dir=uploads/courts
app.base-url=http://localhost:8080


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB


cloudinary.cloud-name=YOUR_CLOUD_NAME
cloudinary.api-key=YOUR_API_KEY
cloudinary.api-secret=YOUR_API_SECRET
cloudinary.mock-mode=true



spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true



# URL frontend để tạo link reset password trong email
app.reset-password.base-url=http://localhost:8080

