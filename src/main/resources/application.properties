spring.application.name=Project_WebService_IT211

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db_badminton?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456

#Config jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config jwt
jwt-secret=chuoidetaobimatjwt123456
jwt-expired=600000
jwt-refresh-expired=86400000

#Config upload ảnh
app.upload.dir=uploads/courts
app.base-url=http://localhost:8080

#Giới hạn kích thước multipart (mặc định Spring Boot là 1MB — tăng lên 50MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB